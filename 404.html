<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — HACE Wave Energy</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#1D3D8F">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Signika:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #1D3D8F;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .error-container {
      max-width: 520px;
    }
    .error-code {
      font-family: 'Signika', sans-serif;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 700;
      line-height: 1;
      color: #53BA8F;
      margin-bottom: 0.25em;
    }
    .error-title {
      font-family: 'Signika', sans-serif;
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 600;
      margin-bottom: 0.75em;
    }
    .error-text {
      font-size: 1rem;
      line-height: 1.6;
      opacity: 0.85;
      margin-bottom: 2em;
    }
    .btn-home {
      display: inline-block;
      padding: 0.85em 2.2em;
      background-color: #53BA8F;
      color: #ffffff;
      font-family: 'Signika', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 6px;
      transition: background-color 0.2s ease;
    }
    .btn-home:hover { background-color: #43a77d; }
    .secondary-link {
      display: block;
      margin-top: 1.25em;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .secondary-link:hover { color: #53BA8F; }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Page introuvable</h1>
    <p class="error-text">La page que vous recherchez n'existe pas ou a été déplacée.</p>
    <a href="/" class="btn-home">Retour à l'accueil</a>
    <a href="/en/" class="secondary-link">English version</a>
  </div>
</body>
</html>
